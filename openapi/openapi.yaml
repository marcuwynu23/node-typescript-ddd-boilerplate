openapi: 3.0.3

info:
  title: Express TypeScript API
  version: 1.0.0
  description: API with OpenTelemetry, metrics, and health checks

servers:
  - url: http://localhost:5000

paths:

  /:
    get:
      summary: Root endpoint
      description: Returns a welcome message
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Hello from Express + TypeScript + esbuild!

  /api/greetings:
    get:
      summary: List all greetings
      description: Returns all greetings from the database
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Greeting"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    post:
      summary: Create a greeting
      description: Creates a new greeting in the database
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - message
              properties:
                message:
                  type: string
                  example: Hello World
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Greeting"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/greetings/{id}:
    get:
      summary: Get a greeting by ID
      description: Returns a single greeting by its ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: The greeting ID
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Greeting"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    put:
      summary: Update a greeting
      description: Updates an existing greeting by its ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: The greeting ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - message
              properties:
                message:
                  type: string
                  example: Updated greeting
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Greeting"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    delete:
      summary: Delete a greeting
      description: Deletes a greeting by its ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: The greeting ID
      responses:
        "204":
          description: Deleted (no content)
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /health:
    get:
      summary: Health check
      description: Returns service health and timestamp
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"

  /ready:
    get:
      summary: Readiness check
      description: Returns service readiness status
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"

  /test:
    get:
      summary: Test endpoint
      description: Returns service status for testing
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"

  /api/health:
    get:
      summary: API health check
      description: Returns service health and timestamp
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"

  /api/test:
    get:
      summary: API test endpoint
      description: Returns service status for testing
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"

  /metrics:
    get:
      summary: Prometheus metrics
      description: Exposes metrics for Prometheus scraping
      responses:
        "200":
          description: Metrics output
          content:
            text/plain:
              schema:
                type: string

components:
  schemas:
    Greeting:
      type: object
      properties:
        id:
          type: string
          example: 507f1f77bcf86cd799439011
        message:
          type: string
          example: Hello World
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    HealthResponse:
      type: object
      properties:
        status:
          type: string
          example: ok
        timestamp:
          type: string
          format: date-time

    Error:
      type: object
      properties:
        error:
          type: string
          example: Something went wrong
