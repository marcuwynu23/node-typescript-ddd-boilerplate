openapi: 3.0.3

info:
  title: Express TypeScript API
  version: 1.0.0
  description: API with OpenTelemetry, metrics, and health checks

servers:
  - url: http://localhost:5000

paths:

  /:
    get:
      summary: Root endpoint
      description: Returns a welcome message
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Hello from Express + TypeScript + esbuild!

  /health:
    get:
      summary: Health check
      description: Returns service health and timestamp
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"

  /ready:
    get:
      summary: Readiness check
      description: Returns service readiness status
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"

  /test:
    get:
      summary: Test endpoint
      description: Returns service status for testing
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"

  /api/health:
    get:
      summary: API health check
      description: Returns service health and timestamp
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"

  /api/test:
    get:
      summary: API test endpoint
      description: Returns service status for testing
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"

  /metrics:
    get:
      summary: Prometheus metrics
      description: Exposes metrics for Prometheus scraping
      responses:
        "200":
          description: Metrics output
          content:
            text/plain:
              schema:
                type: string

components:
  schemas:
    HealthResponse:
      type: object
      properties:
        status:
          type: string
          example: ok
        timestamp:
          type: string
          format: date-time